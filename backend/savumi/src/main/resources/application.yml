spring:
  application:
    name: savumi

  datasource:
    url: jdbc:postgresql://localhost:5432/savumi
    username: savumi
    password: savumi_dev

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.savumi: DEBUG
    org.springframework.security: INFO
