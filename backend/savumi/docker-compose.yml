services:
  postgres:
    image: postgres:16-alpine
    container_name: savumi-postgres
    environment:
      POSTGRES_USER: savumi
      POSTGRES_PASSWORD: savumi_dev
      POSTGRES_DB: savumi
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
